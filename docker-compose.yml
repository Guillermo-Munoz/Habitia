version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: habitia-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - habitia-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: habitia-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - habitia-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habitia-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS}
      APP_STORAGE_UPLOAD_DIR: ${APP_STORAGE_UPLOAD_DIR}
      APP_STORAGE_BASE_URL: ${APP_STORAGE_BASE_URL}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - habitia-net

volumes:
  pgdata:
  uploads:

networks:
  habitia-net:
    driver: bridge